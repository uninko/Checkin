name: run

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '8 16 * * *'
    - cron: '0 0 1 * *'  

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run checkin
        run: npm run main
        env:
          GLADOS: ${{ secrets.GLADOS }}
          NOTIFY: ${{ secrets.NOTIFY }}

      - name: Keep repo active
        if: github.event.schedule == '0 0 1 * *' || github.event_name == 'workflow_dispatch'
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .heartbeat
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .heartbeat
          git commit -m "chore: monthly keepalive heartbeat" || echo "No changes to commit"
          git push || echo "No push necessary"
